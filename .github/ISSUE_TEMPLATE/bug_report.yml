name: Bug report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in as much as you can.
  - type: input
    id: deno-version
    attributes:
      label: Deno version
      placeholder: "deno --version"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include steps to reproduce and what you expected.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste output from the terminal or browser console.
      render: shell
